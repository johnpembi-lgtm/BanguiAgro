<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin BanguiAGRO | Gestion & Statistiques</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        forest: '#064E3B',
                        earth: '#92400E',
                        sun: '#FBBF24',
                        sand: '#F9FAFB',
                    },
                    fontFamily: { sans: ['Poppins', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .pagne-pattern { background-image: radial-gradient(#92400E 0.5px, transparent 0.5px); background-size: 10px 10px; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body class="bg-sand text-gray-800 font-sans">

    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-forest rounded-full flex items-center justify-center text-white font-bold text-2xl">BA</div>
                <div>
                    <h1 class="font-black text-2xl text-forest uppercase tracking-tighter">Bangui<span class="text-earth">AGRO</span></h1>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Console de Gestion</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <a href="index.html" class="bg-primary text-white px-6 py-3 rounded-2xl font-bold shadow-lg hover:scale-105 transition-all flex items-center gap-3 text-base">
                    <i class="fas fa-home mr-1"></i> Accueil
                </a>
                <button onclick="handleLogout()" class="bg-red-50 text-red-600 px-5 py-2 rounded-xl font-bold text-sm flex items-center gap-2 hover:bg-red-100 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Déconnexion
                </button>
            </div>
        </div>
        <div class="h-1 w-full pagne-pattern bg-earth"></div>
    </nav>

    <div id="dashboardStats" class="max-w-7xl mx-auto px-6 pt-10 grid grid-cols-2 lg:grid-cols-4 gap-6" style="display: none;">
        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
            <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest mb-2">Total Activités</p>
            <p id="statTotal" class="text-4xl font-black text-forest">0</p>
        </div>
        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
            <p class="text-orange-500 text-[10px] font-black uppercase tracking-widest mb-2">En Attente</p>
            <p id="statPending" class="text-4xl font-black text-orange-500">0</p>
        </div>
        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
            <p class="text-blue-500 text-[10px] font-black uppercase tracking-widest mb-2">Désherbage</p>
            <p id="statWeed" class="text-4xl font-black text-blue-500">0</p>
        </div>
        <div class="bg-forest text-white p-6 rounded-[2rem] shadow-xl">
            <p class="text-emerald-300 text-[10px] font-black uppercase tracking-widest mb-2">CA Estimé (F CFA)</p>
            <p id="statRevenue" class="text-4xl font-black">0</p>
        </div>
    </div>

    <div id="adminContent" class="max-w-7xl mx-auto px-6 py-12" style="display: none;">
        <div class="flex flex-col lg:flex-row gap-12">
            
            <div class="w-full lg:w-64 space-y-2">
                <button class="w-full flex items-center gap-3 p-4 bg-forest text-white rounded-2xl font-bold shadow-lg shadow-forest/20">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    Toutes les ventes
                </button>
                <button class="w-full flex items-center gap-3 p-4 hover:bg-white rounded-2xl font-bold text-gray-500 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Comptabilité
                </button>
            </div>

            <div class="flex-1 space-y-12">
                <section>
                    <div class="flex justify-between items-end mb-6">
                        <h2 class="text-2xl font-black text-forest uppercase tracking-tight">Ventes & Commandes</h2>
                        <span class="text-xs font-bold text-gray-400">Temps réel Firebase</span>
                    </div>
                    <div id="commandesEnCours" class="grid md:grid-cols-2 gap-6">
                    </div>
                </section>

                <section class="bg-blue-50/50 p-8 rounded-[3rem] border border-blue-100">
                    <h2 class="text-2xl font-black text-blue-800 uppercase tracking-tight mb-6">Demandes de Désherbage (Yaka)</h2>
                    <div id="listeDesherbage" class="grid md:grid-cols-2 gap-6">
                    </div>
                </section>
                
                <section>
                    <h2 class="text-xl font-black text-gray-400 uppercase tracking-widest mb-6">Historique des Livraisons</h2>
                    <div id="historiqueVentes" class="grid md:grid-cols-2 gap-6 opacity-60">
                    </div>
                </section>
            </div>
        </div>
    </div>

    <div id="loginForm" class="fixed inset-0 bg-forest/90 backdrop-blur-xl flex items-center justify-center z-[100] p-6">
        <div class="bg-white rounded-[3rem] p-12 max-w-md w-full shadow-2xl text-center">
            <div class="w-20 h-20 bg-forest rounded-3xl mx-auto mb-6 flex items-center justify-center text-white text-3xl font-black">BA</div>
            <h2 class="text-3xl font-black mb-2">Accès Admin</h2>
            <p class="text-gray-400 font-bold mb-8 uppercase text-xs tracking-[0.2em]">Code PIN</p>
            
            <!-- PIN Login Only -->
            <form id="adminPinForm" class="space-y-6">
                <label class="block text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">Code PIN Admin</label>
                <input id="adminPin" type="password" maxlength="3" placeholder="___" class="w-full p-6 text-4xl font-mono bg-gray-50 rounded-3xl text-center outline-none focus:ring-4 focus:ring-forest/30 shadow-xl transition">
                <p id="loginError" class="text-red-500 font-bold text-sm hidden"></p>
                <button type="submit" class="w-full bg-forest text-white py-5 rounded-3xl font-black text-xl shadow-2xl hover:scale-105 transition-all uppercase tracking-wider">Accéder au Dashboard</button>
            </form>
        </div>
    </div>

<script>
    // Simple auth functions only
    function onAuthSuccess() {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('dashboardStats').style.display = 'grid';
        document.getElementById('adminContent').style.display = 'block'; 
        window.loadAdminData(); // Call module-exported function
    }

    window.handleLogout = () => {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('dashboardStats').style.display = 'none';
        document.getElementById('adminContent').style.display = 'none';
    };

    document.getElementById('adminPinForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const pin = document.getElementById('adminPin').value;
        const loginErrorEl = document.getElementById('loginError');
        
        if (pin === '913') {
            loginErrorEl.classList.add('hidden');
            onAuthSuccess();
        } else {
            loginErrorEl.textContent = 'PIN incorrect.';
            loginErrorEl.classList.remove('hidden');
        }
    });

    </script>

    <script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Export global functions
    window.loadAdminData = () => {
        // Commandes
        const q = query(collection(db, "commandes"), orderBy("date", "desc"));
        onSnapshot(q, (snapshot) => {
            const enCours = document.getElementById("commandesEnCours");
            const historique = document.getElementById("historiqueVentes");
            enCours.innerHTML = ""; 
            historique.innerHTML = "";
            let stats = { total: 0, pending: 0, revenue: 0 };

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                stats.total++;

                const card = window.createOrderCard(id, data);
                if (data.statut === "Livré") {
                    historique.appendChild(card);
                    if(data.details.toLowerCase().includes("maïs")) stats.revenue += 8500;
                    if(data.details.toLowerCase().includes("arachide")) stats.revenue += 12000;
                    if(data.details.toLowerCase().includes("charbon")) stats.revenue += 3500;
                } else {
                    stats.pending++;
                    enCours.appendChild(card);
                }
            });
            document.getElementById('statTotal').innerText = stats.total;
            document.getElementById('statPending').innerText = stats.pending;
            document.getElementById('statRevenue').innerText = stats.revenue.toLocaleString();
        });

        // Désherbage
        onSnapshot(collection(db, "devis_desherbage"), (snapshot) => {
            const list = document.getElementById("listeDesherbage");
            list.innerHTML = "";
            document.getElementById('statWeed').innerText = snapshot.size;
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                list.innerHTML += `
                    <div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-blue-500">
                        <h4 class="font-black text-blue-900">${data.client}</h4>
                        <p class="text-xs font-bold text-gray-400 uppercase mt-1">${data.surface}</p>
                        <p class="text-sm mt-3 text-gray-600">${data.message}</p>
                        <div class="mt-4 flex gap-2">
                            <a href="https://wa.me/${data.contact}" target="_blank" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-xs font-bold">WhatsApp</a>
                            <button onclick="window.deleteDocById('devis_desherbage', '${docSnap.id}')" class="text-red-400 p-2">Supprimer</button>
                        </div>
                    </div>`;
            });
        });
    };

    window.markAsDelivered = async (id) => {
        await updateDoc(doc(db, "commandes", id), { statut: "Livré" });
    };

    window.deleteDocById = async (col, id) => {
        if(confirm("Supprimer ?")) await deleteDoc(doc(db, col, id));
    };

    window.createOrderCard = (id, data) => {
        const div = document.createElement('div');
        div.className = "bg-white p-6 rounded-3xl shadow-sm border border-gray-100";
        div.innerHTML = `
            <div class="flex justify-between items-start mb-4">
                <span class="text-[10px] font-black px-3 py-1 rounded-full uppercase ${data.statut === 'Livré' ? 'bg-emerald-100 text-emerald-700' : 'bg-orange-100 text-orange-700'}">${data.statut}</span>
                <p class="font-bold text-forest">${data.contact}</p>
            </div>
            <h3 class="font-black text-lg">${data.client}</h3>
            <p class="text-sm text-gray-500 mt-2">${data.details}</p>
            <div class="mt-6 flex justify-between items-center">
                ${data.statut !== 'Livré' ? `<button onclick="markAsDelivered('${id}')" class="bg-forest text-white px-4 py-2 rounded-xl font-bold text-xs">LIVRER</button>` : '<span>✓</span>'}
                <button onclick="deleteDocById('commandes', '${id}')" class="text-gray-300">Supprimer</button>
            </div>`;
        return div;
    };

    console.log("Firebase Admin module loaded");
    </script>
</body>
</html>
